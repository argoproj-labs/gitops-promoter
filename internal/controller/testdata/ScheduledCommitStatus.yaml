apiVersion: promoter.argoproj.io/v1alpha1
kind: ScheduledCommitStatus
metadata:
  name: webservice-tier-1
  namespace: default
spec:
  key: promotion-window
  promotionStrategyRef:
    name: webservice-tier-1
  timezone: UTC
  exclude:
    - description: Holiday deployment freeze
      cron: "0 0 25 12 *"
      duration: 48h
  environments:
    - branch: environment/development
      allow:
        - description: US East business hours
          cron: "0 6 * * 1-5"
          duration: 12h
          timezone: America/New_York
    - branch: environment/staging
      allow:
        - description: Tuesday deployment window
          cron: "0 9 * * 2"
          duration: 8h
    - branch: environment/production
      exclude:
        - description: Sunday maintenance blackout
          cron: "0 0 * * 0"
          duration: 24h
status:
  observedGeneration: 1
  environments:
    - branch: environment/development
      sha: abc1234567890abc1234567890abc1234567890a
      phase: success
      active:
        allow: "0 6 * * 1-5"
        transition: "2026-07-07T18:00:00Z"
      next:
        allow: "0 6 * * 1-5"
        transition: "2026-07-07T18:00:00Z"
    - branch: environment/staging
      sha: def4567890abc1234567890abc1234567890abcd
      phase: pending
      next:
        allow: "0 9 * * 2"
        transition: "2026-07-08T09:00:00Z"
    - branch: environment/production
      sha: 1234567890abc1234567890abc1234567890abcd
      phase: success
      next:
        exclude: "0 0 * * 0"
        transition: "2026-07-13T00:00:00Z"
  conditions:
    - type: Ready
      status: "True"
      reason: Reconciled
      message: "All environments evaluated"
      lastTransitionTime: "2026-07-07T10:00:00Z"
