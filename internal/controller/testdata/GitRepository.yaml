apiVersion: promoter.argoproj.io/v1alpha1
kind: GitRepository
metadata:
  name: example-git-repository
spec:
  # Only one of the git providers should be specified.
  github:
    name:
    owner:

  gitlab:
    name:
    namespace:
    projectId:

  forgejo:
    name:
    owner:

  gitea:
    name:
    owner:

  bitbucketCloud:
    owner:
    name:

  azureDevOps:
    name:
    project:

  # fake:
  #   name: example
  #   owner: example

  scmProviderRef:
    kind: ScmProvider # or ClusterScmProvider
    name: example-scm-provider

  # How promotion pull requests are merged: "merge" (a merge commit, the default) or "squash"
  # (a single squash commit per promotion). Squash is not supported for Bitbucket Cloud.
  mergeMethod: merge
status:
  observedGeneration: 123 # compare with metadata.generation to detect stale status
  conditions:
    - type: Ready
      lastTransitionTime: 2023-10-01T00:00:00Z
      message: Reconciliation succeeded
      reason: ReconciliationSuccess # ReconciliationSuccess or ReconciliationError
      status: "True"
      observedGeneration: 123
