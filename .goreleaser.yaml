# Based on: https://github.com/argoproj-labs/gitops-promoter/blob/main/.goreleaser.yaml
# This file must be kept in sync with .gorleaser-latest.yaml except for release section
# The lines below are called `modelines`. See `:help modeline`
# yaml-language-server: $schema=https://raw.githubusercontent.com/goreleaser/goreleaser/v2.13.2/www/docs/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

project_name: gitops-promoter
version: 2

dist: release_dist

before:
  hooks:
    - go mod tidy
    - go mod download
    - make manifests-release IMAGE_TAG={{ .Tag }}
    - make build-dashboard # Builds the dashboards UI and embeds it
    - make build-extension # Build the ArgoCD extension

builds:
  - id: gitops-promoter
    main: ./cmd
    binary: gitops-promoter
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -v
    goos:
      - linux
      - darwin
    ldflags:
      - -X github.com/argoproj-labs/gitops-promoter/common.version={{ .Version }}
      - -X github.com/argoproj-labs/gitops-promoter/common.buildDate={{ .Date }}
      - -extldflags="-static"

dockers:
  - image_templates:
      - quay.io/argoprojlabs/gitops-promoter:{{ .Tag }}-amd64
    dockerfile: release.Dockerfile
    skip_push: "{{ .IsSnapshot }}"
    use: buildx
    goarch: amd64
    extra_files:
      - hack/git/promoter_askpass.sh
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--platform=linux/amd64"
      - "--provenance=false"
  - image_templates:
      - quay.io/argoprojlabs/gitops-promoter:{{ .Tag }}-arm64
    dockerfile: release.Dockerfile
    extra_files:
      - hack/git/promoter_askpass.sh
    skip_push: "{{ .IsSnapshot }}"
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--platform=linux/arm64"
      - "--provenance=false"
docker_manifests:
  - name_template: "quay.io/argoprojlabs/gitops-promoter:{{ .Tag }}"
    image_templates:
      - "quay.io/argoprojlabs/gitops-promoter:{{ .Tag }}-amd64"
      - "quay.io/argoprojlabs/gitops-promoter:{{ .Tag }}-arm64"

checksum:
  extra_files:
    - glob: ./install.yaml

binary_signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    ids:
      - gitops-promoter
    output: true

signs:
  - id: archives
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: archive
    output: true
  - id: checksum
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    args:
      - sign
      - "${artifact}"
      - "--yes"
    artifacts: all
    output: true

archives:
  - id: binary
    formats: [tar.gz]
    ids:
      - "gitops-promoter"
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
  - id: extension
    name_template: "{{ .ProjectName }}-argocd-extension"
    formats: [tar.gz]
    meta: true
    files:
      - ui/extension/dist/extension-promoter.js
    # Wrap in top-level resources directory to be compatible with the extension installer: https://github.com/argoproj-labs/argocd-extension-installer/blob/4684a5d2fb8b94269ee22556794aad229485f48d/README.md#L25
    wrap_in_directory: 'resources'

release:
  prerelease: auto
  draft: true
  extra_files:
    - glob: ./install.yaml
  header: |
    <picture>
      <source media="(prefers-color-scheme: dark)" srcset="https://raw.githubusercontent.com/argoproj-labs/gitops-promoter/b0d68761a0f8103ea83f84b5faa382cebcd0ebd4/docs/assets/logo/stacked/secondary.svg">
      <img src="https://raw.githubusercontent.com/argoproj-labs/gitops-promoter/b0d68761a0f8103ea83f84b5faa382cebcd0ebd4/docs/assets/logo/stacked/primary.svg" alt="GitOps Promoter" width="400">
    </picture>
    
    ---
    
    If you're using GitOps Promoter, please add yourself to [USERS.md](https://github.com/argoproj-labs/gitops-promoter/blob/main/USERS.md)!

    If you're evaluating GitOps Promoter, we'd love to hear from you — please [open a discussion](https://github.com/argoproj-labs/gitops-promoter/discussions) to share your feedback.
    
    ---

  footer: |
    ### Verifying this release (Sigstore / cosign)

    **Container image** (for tag `{{ .Tag }}`):

    ```bash
    cosign verify \
      --certificate-identity 'https://github.com/argoproj-labs/gitops-promoter/.github/workflows/release.yaml@refs/tags/{{ .Tag }}' \
      --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      quay.io/argoprojlabs/gitops-promoter:{{ .Tag }}
    ```

    **`latest` images** on Quay are signed from [release-latest.yaml](https://github.com/argoproj-labs/gitops-promoter/blob/main/.github/workflows/release-latest.yaml) on `main`:

    ```bash
    cosign verify \
      --certificate-identity 'https://github.com/argoproj-labs/gitops-promoter/.github/workflows/release-latest.yaml@refs/heads/main' \
      --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      quay.io/argoprojlabs/gitops-promoter:latest
    ```

    **Checksums, tarballs, and binaries**: Each file in the checksums manifest, each release `.tar.gz`, and each `gitops-promoter` binary has a matching `*.sigstore.json` bundle. Example for the checksums file:

    ```bash
    cosign verify-blob \
      --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      --certificate-identity 'https://github.com/argoproj-labs/gitops-promoter/.github/workflows/release.yaml@refs/tags/{{ .Tag }}' \
      --bundle gitops-promoter_{{ .Version }}_checksums.txt.sigstore.json \
      gitops-promoter_{{ .Version }}_checksums.txt
    ```

    Use the same `--certificate-identity` and issuer with the `.sigstore.json` / artifact pair for any other file from this release.

    **Full Changelog**: https://github.com/argoproj-labs/gitops-promoter/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  use:
    github
  sort: asc
  abbrev: 0
  groups: # Regex use RE2 syntax as defined here: https://github.com/google/re2/wiki/Syntax.
    - title: 'Features'
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: 'Documentation'
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 300
    - title: 'Dependency updates'
      regexp: '^.*?(feat|fix|chore)\(deps?.+\)!?:.+$'
      order: 400
    - title: 'Other work'
      order: 999
  filters:
    exclude:
      - '^test:'
      - '^.*?Bump(\([[:word:]]+\))?.+$'
