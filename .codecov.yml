coverage:
  status:
    # allow test coverage to drop by 0.1%, assume that it's typically due to CI problems
    patch:
      default:
        threshold: 0.1
    project:
      default:
        threshold: 0.1
      # Vitest lcov from CI (ui/dashboard, ui/extension) + any hits under shared UI packages
      ui:
        target: auto
        threshold: 0.1
        paths:
          - ui/dashboard
          - ui/extension
          - ui/components-lib
          - ui/shared
ignore:
  - 'api/v1alpha1'
  - 'applyconfiguration'
  - 'test'
  - 'cmd'
  - 'config'
  - 'dist'
  - 'hack'
  - 'internal/scms/mock'
  - 'internal/controller/testutils'
  - '**/zz_generated.*'
