title: "Promote {{ trunc 7 .ChangeTransferPolicy.Status.Proposed.Dry.Sha }} to `{{ .ChangeTransferPolicy.Spec.ActiveBranch }}`"
description: |
  Promote to {{ .ChangeTransferPolicy.Spec.ActiveBranch }}
