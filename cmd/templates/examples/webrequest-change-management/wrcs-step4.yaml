# WebRequestCommitStatus snapshot for the optional `after-state-change` step, used via
# --web-request-updated.
#
# The `spec` is identical to wrcs.yaml. The interesting part is the `status` block: the simulator
# re-seeds the `after-state-change` step's carry-forward state from status.promotionStrategyContext
# here, mirroring what the real controller does when it starts a reconcile after writing back
# status to the API.
#
# Expected simulator behavior:
#   - `reconcile` and `next-reconcile` run as usual (cold start → success via HTTP → carry-forward success).
#   - The `after-state-change` step re-seeds TriggerOutput.lastFingerprint from the status block
#     below. That value is intentionally a DIFFERENT fingerprint than the one the reconcile step
#     established, so Variables.fingerprint != TriggerOutput.lastFingerprint → the trigger
#     RE-FIRES → mock HTTP is injected again → success.when HTTP branch runs.
#
# This is the status-only equivalent of using --promotion-strategy-updated with ps-step4.yaml:
# either way, the stored fingerprint no longer matches the current computed fingerprint, so the
# trigger evaluates to true and a fresh reconcile is simulated. Use this form when the upstream
# change is best described as "the controller wrote back new status" rather than "a spec/SHA
# change happened upstream."
apiVersion: promoter.argoproj.io/v1alpha1
kind: WebRequestCommitStatus
metadata:
  name: change-management-open
  namespace: default
spec:
  # Same spec as wrcs.yaml — copy it through so the WRCS round-trips unchanged.
  # (Only the status block below actually differs from wrcs.yaml.)
  promotionStrategyRef:
    name: argocon-demo
  key: change-management-open
  reportOn: proposed
  descriptionTemplate: "{{ .Phase }}"
  httpRequest:
    method: POST
    urlTemplate: http://localhost:8987/v1/change-management-service/change
    timeout: 30s
  mode:
    context: promotionstrategy
    trigger:
      requeueDuration: 30s
      when:
        expression: "true"
  success:
    when:
      variables:
        expression: |
          let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
          let statusList = PromotionStrategy.Status.Environments ?? [];
          let fingerprint = join(map(specEnvsList, {
            let se = #;
            let st = find(statusList, { #.Branch == se.Branch });
            se.Branch + ":" + (st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != "" ? st.Proposed.Note.DrySha : "")
          }), "|");
          { fingerprint: fingerprint }
      expression: |
        Response != nil
          ? (Response.StatusCode == 202 && Response.Body != nil && Response.Body.id != nil && Response.Body.id != "")
          : (Phase == "success" && Variables.fingerprint == (TriggerOutput["lastFingerprint"] ?? ""))
status:
  # Re-seeded carry-forward state for the `after-state-change` step.
  #
  # NOTE: when the simulator re-seeds from this, it IGNORES the `next-reconcile` step's computed
  # outputs and uses the values here instead. That's why we can force a fingerprint mismatch here
  # without having to modify the PromotionStrategy.
  promotionStrategyContext:
    phasePerBranch:
      - branch: environments/production
        phase: success
    triggerOutput:
      lastFingerprint: "ancient-fingerprint-that-no-longer-matches-anything"
