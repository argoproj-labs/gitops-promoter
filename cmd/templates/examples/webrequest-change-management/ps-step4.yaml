# PromotionStrategy snapshot for the optional `after-state-change` step.
# Identical to ps.yaml EXCEPT: only environments/production.proposed.note.drySha has advanced.
# Development and staging still show the previous dry SHA, so allNoteDryShasMatch is false.
#
# Expected simulator behavior:
#   - success.when.variables recomputes fingerprint — it includes production's new DrySha, so the
#     string no longer matches TriggerOutput.lastFingerprint from the prior steps (uniform SHA).
#   - The trigger does NOT fire: hasOpenPR && allNoteDryShasMatch && … requires matching dry SHAs
#     across every spec environment, which fails once production has drifted ahead alone.
#   - No mock HTTP injection → success.when uses the carry-forward branch (Response == nil).
#     Phase was success but fingerprint != lastFingerprint → commit status decays to pending.
#
# Contrast: if every branch advanced together (same new DrySha everywhere), allNoteDryShasMatch
# would stay true and the trigger would re-fire for a fresh POST — see git history or use
# `--web-request-updated` with a stale seeded fingerprint to model other paths.
apiVersion: promoter.argoproj.io/v1alpha1
kind: PromotionStrategy
metadata:
  name: argocon-demo
  namespace: default
spec:
  gitRepositoryRef:
    name: argocon-demo
  environments:
    - branch: environments/development
    - branch: environments/staging
    - branch: environments/production
      proposedCommitStatuses:
        - key: change-management-open
status:
  environments:
    - branch: environments/development
      proposed:
        hydrated:
          sha: "a111111111111111111111111111111111111111"
        # Unchanged from ps.yaml — still aligned with staging.
        note:
          drySha: "73a80cb8dc22bf7b17c0fdd8dda2ef6627e92974"
      active:
        hydrated:
          sha: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    - branch: environments/staging
      proposed:
        hydrated:
          sha: "b222222222222222222222222222222222222222"
        note:
          drySha: "73a80cb8dc22bf7b17c0fdd8dda2ef6627e92974"
      active:
        hydrated:
          sha: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
    - branch: environments/production
      proposed:
        hydrated:
          sha: "c333333333333333333333333333333333333333"
        # Only production has moved to a new dry snapshot — breaks allNoteDryShasMatch.
        note:
          drySha: "fee15baddecafc0ffeefee15baddecafc0ffeefa"
      active:
        hydrated:
          sha: "cccccccccccccccccccccccccccccccccccccccc"
      pullRequest:
        id: "2710"
        state: open
        url: "https://github.com/your-org/argocon-demo/pull/2710"
