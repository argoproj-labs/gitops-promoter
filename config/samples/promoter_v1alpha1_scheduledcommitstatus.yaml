apiVersion: promoter.argoproj.io/v1alpha1
kind: ScheduledCommitStatus
metadata:
  labels:
    app.kubernetes.io/name: promoter
    app.kubernetes.io/managed-by: kustomize
  name: scheduledcommitstatus-sample
spec:
  key: promotion-window
  promotionStrategyRef:
    name: promotionstrategy-sample
  timezone: UTC
  exclude:
    - description: Holiday deployment freeze
      cron: "0 0 25 12 *"
      duration: 48h
  environments:
    - branch: environment/development
      allow:
        - description: Weekday business hours
          cron: "0 6 * * 1-5"
          duration: 12h
    - branch: environment/staging
      allow:
        - description: Tuesday deployment window
          cron: "0 9 * * 2"
          duration: 8h
