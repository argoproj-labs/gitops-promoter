apiVersion: apps/v1
kind: Deployment
metadata:
  name: promoter-apiserver
  namespace: promoter-system
  labels:
    app.kubernetes.io/name: deployment
    app.kubernetes.io/component: dashboard-apiserver
    app.kubernetes.io/part-of: promoter
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: dashboard-apiserver
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dashboard-apiserver
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: apiserver
          image: quay.io/argoprojlabs/gitops-promoter:latest
          command:
            - /usr/bin/tini
            - "--"
            - /gitops-promoter
            - apiserver
          args:
            - --secure-port=6443
            - --tls-cert-file=/serving-certs/tls.crt
            - --tls-private-key-file=/serving-certs/tls.key
            # Delegated authentication/authorization use the pod's in-cluster
            # service account when these kubeconfigs are not supplied.
          ports:
            - name: https
              containerPort: 6443
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          livenessProbe:
            httpGet:
              path: /livez
              port: https
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: serving-cert
              mountPath: /serving-certs
              readOnly: true
            - name: tmp
              mountPath: /tmp
      serviceAccountName: promoter-apiserver
      terminationGracePeriodSeconds: 10
      volumes:
        - name: serving-cert
          secret:
            secretName: promoter-apiserver-serving-cert
        - name: tmp
          emptyDir: {}
