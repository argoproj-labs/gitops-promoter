apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This base is intentionally self-contained (final resource names and namespaces
# are baked in) so it can be applied directly with `kubectl apply -k`. It is NOT
# folded into config/default because config/default's `namespace: promoter-system`
# transformer would relocate the extension-apiserver-authentication-reader RoleBinding
# out of kube-system, where it must stay: a RoleBinding resolves its roleRef in its own
# namespace, and that Role (granting read on the extension-apiserver-authentication
# ConfigMap) only exists in kube-system. Moving it breaks delegated authentication.
# (config/default's namePrefix is harmless to the APIService name itself - kustomize
# leaves APIService/CRD names alone - but would double-prefix the other resources.)
#
# Pick a cert overlay instead of applying this base directly:
#   kubectl apply -k config/apiserver/certs-manual
#   kubectl apply -k config/apiserver/certs-cert-manager
# (the base ships without a caBundle on the APIService).

resources:
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - rbac.yaml
  - apiservice.yaml
