apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Combined release bundle: the promoter controller (config/default) PLUS the dashboard
# aggregation apiserver WITHOUT cert-manager ("bring your own cert"). Builds the published
# install-with-dashboard-byo-cert.yaml. The operator supplies the
# promoter-apiserver-serving-cert Secret and patches the APIService caBundle themselves
# (see docs/advanced-usage/dashboard-apiserver.md, manual cert path).
#
# This unions two already-self-contained kustomizations and adds NO namespace/namePrefix
# transformer of its own, so the apiserver base stays intact - in particular the
# extension-apiserver-authentication-reader RoleBinding remains in kube-system. The single
# images: entry pins both the controller and the apiserver Deployments (same image) to the
# release tag via hack/manifests-release.sh.

resources:
  - ../../default
  - ../certs-manual

images:
  - name: quay.io/argoprojlabs/gitops-promoter
