apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: promoter-apiserver-serving-cert
  namespace: promoter-system
  labels:
    app.kubernetes.io/component: dashboard-apiserver
    app.kubernetes.io/part-of: promoter
spec:
  secretName: promoter-apiserver-serving-cert
  dnsNames:
    - promoter-apiserver.promoter-system.svc
    - promoter-apiserver.promoter-system.svc.cluster.local
  issuerRef:
    name: promoter-apiserver-selfsigned
    kind: Issuer
    group: cert-manager.io
