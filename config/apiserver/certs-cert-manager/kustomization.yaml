apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Path B: cert-manager-managed serving certs (opt-in; requires cert-manager).
#
#   kubectl apply -k config/apiserver/certs-cert-manager
#
# A self-signed Issuer + Certificate produce the promoter-apiserver-serving-cert
# Secret, and the cert-manager.io/inject-ca-from annotation makes ca-injector keep
# the APIService .spec.caBundle in sync automatically (including on rotation).

resources:
  - ../base
  - issuer.yaml
  - certificate.yaml

patches:
  - path: apiservice_cainjection_patch.yaml
    target:
      group: apiregistration.k8s.io
      version: v1
      kind: APIService
      name: v1alpha1.view.promoter.argoproj.io
