---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: dagcommitstatuses.promoter.argoproj.io
spec:
  group: promoter.argoproj.io
  names:
    kind: DAGCommitStatus
    listKind: DAGCommitStatusList
    plural: dagcommitstatuses
    singular: dagcommitstatus
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DAGCommitStatus is the Schema for the dagcommitstatuses API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of DAGCommitStatus
            properties:
              environments:
                description: |-
                  Environments declares the promotion dependency graph. Each entry names an environment branch
                  and the upstream branches it depends on. An environment becomes eligible for promotion once
                  all of its dependsOn upstreams are satisfied. An entry with no dependsOn is a graph root.
                  The graph must be acyclic; cycles and references to unknown branches are rejected.
                items:
                  description: DAGEnvironment is a single node in the promotion dependency
                    graph.
                  properties:
                    branch:
                      description: |-
                        Branch is the name of the active branch for the environment. It must match a branch declared
                        in the referenced PromotionStrategy's environments.
                        Must not start with '-', contain ':', or contain '..'.
                      maxLength: 100
                      minLength: 1
                      type: string
                      x-kubernetes-validations:
                      - message: branch must not start with '-'
                        rule: '!self.startsWith(''-'')'
                      - message: branch must not contain ':'
                        rule: '!self.contains('':'')'
                      - message: branch must not contain '..'
                        rule: '!self.contains(''..'')'
                    dependsOn:
                      description: |-
                        DependsOn is the list of upstream branches this environment depends on. The environment is
                        only eligible for promotion once every branch listed here is satisfied. An empty or omitted
                        list makes this environment a root of the graph.
                        Each item must not start with '-', contain ':', or contain '..'.
                      items:
                        maxLength: 100
                        minLength: 1
                        type: string
                        x-kubernetes-validations:
                        - message: branch must not start with '-'
                          rule: '!self.startsWith(''-'')'
                        - message: branch must not contain ':'
                          rule: '!self.contains('':'')'
                        - message: branch must not contain '..'
                          rule: '!self.contains(''..'')'
                      maxItems: 100
                      type: array
                      x-kubernetes-list-type: set
                  required:
                  - branch
                  type: object
                  x-kubernetes-validations:
                  - message: branch cannot depend on itself
                    rule: '!has(self.dependsOn) || self.dependsOn.all(d, d != self.branch)'
                maxItems: 1000
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - branch
                x-kubernetes-list-type: map
              key:
                description: |-
                  Key is the commit status key referenced in the PromotionStrategy's proposedCommitStatuses.
                  It must match a key declared there so the gate this controller produces is enforced.
                  Must be lowercase alphanumeric with hyphens, 1–63 characters (pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$).
                maxLength: 63
                minLength: 1
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              promotionStrategyRef:
                description: |-
                  PromotionStrategyRef is a reference to the promotion strategy that this DAG commit status
                  applies to. The controller watches this PromotionStrategy and, for each environment, reports
                  whether the environment's upstream dependencies (as declared in Environments) are satisfied.
                properties:
                  name:
                    description: Name is the name of the object to refer to.
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$
                    type: string
                required:
                - name
                type: object
            required:
            - environments
            - key
            - promotionStrategyRef
            type: object
          status:
            description: status defines the observed state of DAGCommitStatus
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the DAGCommitStatus resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the .metadata.generation that this status was reconciled from.
                  Because status is written via Server-Side Apply with ForceOwnership (which has no
                  optimistic-concurrency check), this field is the canonical way to detect stale
                  status writes: compare status.observedGeneration with metadata.generation.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
