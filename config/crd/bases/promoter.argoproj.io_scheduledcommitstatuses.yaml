---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: scheduledcommitstatuses.promoter.argoproj.io
spec:
  group: promoter.argoproj.io
  names:
    kind: ScheduledCommitStatus
    listKind: ScheduledCommitStatusList
    plural: scheduledcommitstatuses
    singular: scheduledcommitstatus
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.promotionStrategyRef.name
      name: PromotionStrategy
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ScheduledCommitStatus is the Schema for the scheduledcommitstatuses
          API.
        externalDocs:
          description: CRD reference (examples and behavior)
          url: https://gitops-promoter.readthedocs.io/en/stable/crd-specs/#scheduledcommitstatus
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ScheduledCommitStatus
            properties:
              allow:
                description: |-
                  Allow defines global allow windows applied to all listed environments in addition to
                  per-environment allow windows (OR semantics across all).
                items:
                  description: CronWindow defines a recurring time window using a
                    cron expression and a duration.
                  properties:
                    cron:
                      description: |-
                        Cron is a standard 5-field cron expression defining the start of the window
                        (minute hour day-of-month month day-of-week). For example "0 9 * * 1-5" means
                        Monday–Friday at 09:00 in the configured timezone.
                      maxLength: 256
                      minLength: 9
                      type: string
                    description:
                      description: |-
                        Description is an optional human-readable explanation of this window
                        (e.g. "US East business hours", "Holiday deployment freeze").
                      maxLength: 256
                      type: string
                    duration:
                      description: |-
                        Duration is how long the window remains open after the cron trigger.
                        The duration should be in a format accepted by Go's time.ParseDuration function, e.g., "8h", "30m", "2h30m".
                      type: string
                    timezone:
                      description: |-
                        Timezone overrides the spec-level default timezone for this specific window.
                        If not set, the spec-level timezone (or UTC if that is also not set) is used.
                      maxLength: 64
                      pattern: ^[a-zA-Z0-9_/+-]*$
                      type: string
                  required:
                  - cron
                  - duration
                  type: object
                maxItems: 20
                type: array
              environments:
                description: |-
                  Environments defines the list of environments to gate. Only listed environments are gated;
                  unlisted environments default to success (24/7 open). Each environment inherits global
                  allow/exclude windows and may add its own. An environment with no per-environment windows
                  is valid when global windows are defined.
                items:
                  description: ScheduledEnvironment defines the window configuration
                    for a single environment.
                  properties:
                    allow:
                      description: |-
                        Allow defines the allowed promotion windows. Promotions are allowed when the current time
                        falls inside any of these windows (OR semantics). These are combined with any global
                        spec.allow windows. If no allow windows are defined (neither here nor globally), the
                        environment operates in exclusion-only mode.
                      items:
                        description: CronWindow defines a recurring time window using
                          a cron expression and a duration.
                        properties:
                          cron:
                            description: |-
                              Cron is a standard 5-field cron expression defining the start of the window
                              (minute hour day-of-month month day-of-week). For example "0 9 * * 1-5" means
                              Monday–Friday at 09:00 in the configured timezone.
                            maxLength: 256
                            minLength: 9
                            type: string
                          description:
                            description: |-
                              Description is an optional human-readable explanation of this window
                              (e.g. "US East business hours", "Holiday deployment freeze").
                            maxLength: 256
                            type: string
                          duration:
                            description: |-
                              Duration is how long the window remains open after the cron trigger.
                              The duration should be in a format accepted by Go's time.ParseDuration function, e.g., "8h", "30m", "2h30m".
                            type: string
                          timezone:
                            description: |-
                              Timezone overrides the spec-level default timezone for this specific window.
                              If not set, the spec-level timezone (or UTC if that is also not set) is used.
                            maxLength: 64
                            pattern: ^[a-zA-Z0-9_/+-]*$
                            type: string
                        required:
                        - cron
                        - duration
                        type: object
                      maxItems: 20
                      type: array
                    branch:
                      description: |-
                        Branch is the name of the branch/environment you want to gate with time windows.
                        Must not start with '-', contain ':', or contain '..'.
                      maxLength: 100
                      minLength: 1
                      type: string
                      x-kubernetes-validations:
                      - message: branch must not start with '-'
                        rule: '!self.startsWith(''-'')'
                      - message: branch must not contain ':'
                        rule: '!self.contains('':'')'
                      - message: branch must not contain '..'
                        rule: '!self.contains(''..'')'
                    exclude:
                      description: |-
                        Exclude defines blackout periods during which promotions are blocked. Exclusions take
                        precedence over allow windows — if the current time falls inside any exclusion, promotions
                        are blocked regardless of allow windows. These are combined with any global spec.exclude
                        windows. If empty, no blackout periods are applied.
                      items:
                        description: CronWindow defines a recurring time window using
                          a cron expression and a duration.
                        properties:
                          cron:
                            description: |-
                              Cron is a standard 5-field cron expression defining the start of the window
                              (minute hour day-of-month month day-of-week). For example "0 9 * * 1-5" means
                              Monday–Friday at 09:00 in the configured timezone.
                            maxLength: 256
                            minLength: 9
                            type: string
                          description:
                            description: |-
                              Description is an optional human-readable explanation of this window
                              (e.g. "US East business hours", "Holiday deployment freeze").
                            maxLength: 256
                            type: string
                          duration:
                            description: |-
                              Duration is how long the window remains open after the cron trigger.
                              The duration should be in a format accepted by Go's time.ParseDuration function, e.g., "8h", "30m", "2h30m".
                            type: string
                          timezone:
                            description: |-
                              Timezone overrides the spec-level default timezone for this specific window.
                              If not set, the spec-level timezone (or UTC if that is also not set) is used.
                            maxLength: 64
                            pattern: ^[a-zA-Z0-9_/+-]*$
                            type: string
                        required:
                        - cron
                        - duration
                        type: object
                      maxItems: 20
                      type: array
                  required:
                  - branch
                  type: object
                maxItems: 1000
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - branch
                x-kubernetes-list-type: map
              exclude:
                description: |-
                  Exclude defines global exclusion windows applied to all listed environments in addition to
                  per-environment exclusions. Exclusions take precedence over allow windows.
                items:
                  description: CronWindow defines a recurring time window using a
                    cron expression and a duration.
                  properties:
                    cron:
                      description: |-
                        Cron is a standard 5-field cron expression defining the start of the window
                        (minute hour day-of-month month day-of-week). For example "0 9 * * 1-5" means
                        Monday–Friday at 09:00 in the configured timezone.
                      maxLength: 256
                      minLength: 9
                      type: string
                    description:
                      description: |-
                        Description is an optional human-readable explanation of this window
                        (e.g. "US East business hours", "Holiday deployment freeze").
                      maxLength: 256
                      type: string
                    duration:
                      description: |-
                        Duration is how long the window remains open after the cron trigger.
                        The duration should be in a format accepted by Go's time.ParseDuration function, e.g., "8h", "30m", "2h30m".
                      type: string
                    timezone:
                      description: |-
                        Timezone overrides the spec-level default timezone for this specific window.
                        If not set, the spec-level timezone (or UTC if that is also not set) is used.
                      maxLength: 64
                      pattern: ^[a-zA-Z0-9_/+-]*$
                      type: string
                  required:
                  - cron
                  - duration
                  type: object
                maxItems: 20
                type: array
              key:
                description: |-
                  Key is the gate name referenced in the PromotionStrategy's proposedCommitStatuses.
                  Must be lowercase alphanumeric with hyphens, 1–63 characters (pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$).
                maxLength: 63
                minLength: 1
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              promotionStrategyRef:
                description: PromotionStrategyRef is a reference to the promotion
                  strategy that this scheduled commit status applies to.
                properties:
                  name:
                    description: Name is the name of the object to refer to.
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$
                    type: string
                required:
                - name
                type: object
              timezone:
                default: UTC
                description: |-
                  Timezone is the default IANA timezone name used for evaluating cron expressions across all windows.
                  Individual windows may override this with their own timezone field.
                  Defaults to UTC.
                maxLength: 64
                pattern: ^[a-zA-Z0-9_/+-]*$
                type: string
            required:
            - environments
            - key
            - promotionStrategyRef
            type: object
            x-kubernetes-validations:
            - message: each environment must have at least one allow or exclude window,
                either per-environment or global
              rule: self.environments.all(e, size(e.allow) > 0 || size(e.exclude)
                > 0 || size(self.allow) > 0 || size(self.exclude) > 0)
          status:
            description: status defines the observed state of ScheduledCommitStatus
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of an object's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              environments:
                description: Environments holds the status of each environment being
                  tracked.
                items:
                  description: ScheduledEnvironmentStatus defines the observed window
                    state for a specific environment.
                  properties:
                    active:
                      description: |-
                        Active holds details of the currently active window driving the phase.
                        Nil when no specific window is active (e.g. exclusion-only mode with no active exclusion).
                      properties:
                        allow:
                          description: Allow is the cron expression of the allow window,
                            if applicable.
                          type: string
                        exclude:
                          description: Exclude is the cron expression of the exclusion
                            window, if applicable.
                          type: string
                        transition:
                          description: |-
                            Transition is when this window state is expected to change
                            (e.g. window closing for active, window opening for next).
                          format: date-time
                          type: string
                      type: object
                    branch:
                      description: Branch is the name of the branch/environment.
                      minLength: 1
                      type: string
                    next:
                      description: |-
                        Next holds details of the next expected window transition.
                        Used by UIs for countdown timers and by the controller for precise requeuing.
                      properties:
                        allow:
                          description: Allow is the cron expression of the allow window,
                            if applicable.
                          type: string
                        exclude:
                          description: Exclude is the cron expression of the exclusion
                            window, if applicable.
                          type: string
                        transition:
                          description: |-
                            Transition is when this window state is expected to change
                            (e.g. window closing for active, window opening for next).
                          format: date-time
                          type: string
                      type: object
                    phase:
                      description: Phase represents the current phase of the scheduled
                        gate.
                      enum:
                      - pending
                      - success
                      type: string
                    sha:
                      description: |-
                        Sha is the proposed commit SHA being tracked for this environment.
                        Supports both SHA-1 (40 chars) and SHA-256 (64 chars) Git hash formats.
                      maxLength: 64
                      pattern: ^([a-f0-9]{40}|[a-f0-9]{64})$
                      type: string
                  required:
                  - branch
                  - phase
                  - sha
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - branch
                x-kubernetes-list-type: map
              instanceID:
                description: |-
                  InstanceID mirrors metadata.labels[promoter.argoproj.io/instance-id] stamped on each
                  reconcile attempt by this install's controller, including when Ready=False; omitted
                  when the resource has no instance-id label (default install).
                maxLength: 63
                minLength: 1
                pattern: ^[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])?$
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the .metadata.generation that this status was reconciled from.
                  Because status is written via Server-Side Apply with ForceOwnership (which has no
                  optimistic-concurrency check), this field is the canonical way to detect stale
                  status writes: compare status.observedGeneration with metadata.generation.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
