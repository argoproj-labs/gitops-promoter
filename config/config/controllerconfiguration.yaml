apiVersion: promoter.argoproj.io/v1alpha1
kind: ControllerConfiguration
metadata:
  labels:
    app.kubernetes.io/name: promoter
    app.kubernetes.io/part-of: promoter
    app.kubernetes.io/managed-by: kustomize
  name: controller-configuration
spec:
  promotionStrategy:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  changeTransferPolicy:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  pullRequest:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
    template:
      title: "Promote {{ trunc 5 .ChangeTransferPolicy.Status.Proposed.Dry.Sha }} to `{{ .ChangeTransferPolicy.Spec.ActiveBranch }}`"
      description: |
        This PR is promoting the environment branch `{{ .ChangeTransferPolicy.Spec.ActiveBranch }}`
        
        ## Changes
        Active dry SHA: {{ trunc 7 .ChangeTransferPolicy.Status.Active.Dry.Sha }}
        Proposed dry SHA: {{ trunc 7 .ChangeTransferPolicy.Status.Proposed.Dry.Sha }}
        
        {{- range .PromotionStrategy.Status.Environments }}{{- if eq .Branch $.ChangeTransferPolicy.Spec.ActiveBranch }}
        {{- if .Active.Dry.References }}
        ### Current (Active)
        | Subject | Repo | Date | Sha |
        |---------|------|------|------|
        {{- range .Active.Dry.References }}
        | {{ .Commit.Subject }} | {{ .Commit.RepoURL }} | {{ .Commit.Date }} | [{{ trunc 7 .Commit.Sha }}]({{ .Commit.RepoURL }}/commit/{{ .Commit.Sha }}) |
        {{- end }}
        {{- end }}
        {{- end }}{{- end }}
        
        {{- range .PromotionStrategy.Status.Environments }}{{- if eq .Branch $.ChangeTransferPolicy.Spec.ActiveBranch }}
        {{- if .Proposed.Dry.References }}
        ### Proposed
        | Subject | Repo | Date | Sha |
        |---------|------|------|------|
        {{- range .Proposed.Dry.References }}
        | {{ .Commit.Subject }} | {{ .Commit.RepoURL }} | {{ .Commit.Date }} | [{{ trunc 7 .Commit.Sha }}]({{ .Commit.RepoURL }}/commit/{{ .Commit.Sha }}) |
        {{- end }}
        {{- end }}
        {{- end }}{{- end }}
        
        ## 🔄 Promotion Flow
        
        {{- range .PromotionStrategy.Status.Environments }}
        {{- if eq .Branch $.ChangeTransferPolicy.Spec.ActiveBranch }}
        - **{{ .Branch }}** ← (this PR)
        {{- else if .PullRequest }}
        {{- if .PullRequest.Url }}
        - [{{ .Branch }}]({{ .PullRequest.Url }})
        {{- else }}
        - {{ .Branch }}
        {{- end }}
        {{- else }}
        - {{ .Branch }}
        {{- end }}
        {{- end }}
        
        
        ```mermaid
        graph LR
        {{- range $i, $env := .PromotionStrategy.Spec.Environments }}
        {{- if gt $i 0 }}
            {{ (index $.PromotionStrategy.Spec.Environments (sub $i 1)).Branch }} --> {{ .Branch }}
        {{- end }}
        {{- if eq .Branch $.ChangeTransferPolicy.Spec.ActiveBranch }}
            style {{ .Branch }} fill:#90EE90,stroke:#228B22
        {{- end }}
        {{- end }}
        ```
  commitStatus:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "1m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  argocdCommitStatus:
    watchLocalApplications: true
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  timedCommitStatus:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  gitCommitStatus:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  webRequestCommitStatus:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
