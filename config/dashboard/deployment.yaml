apiVersion: apps/v1
kind: Deployment
metadata:
  name: promoter-dashboard
  namespace: promoter-system
  labels:
    app.kubernetes.io/name: deployment
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: promoter
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          image: quay.io/argoprojlabs/gitops-promoter:latest
          command:
            - /usr/bin/tini
            - "--"
            - /gitops-promoter
            - dashboard
          args:
            - --port=8080
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 250m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
      serviceAccountName: promoter-dashboard
      terminationGracePeriodSeconds: 10
