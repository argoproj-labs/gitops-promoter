apiVersion: v1
kind: Service
metadata:
  name: promoter-dashboard
  namespace: promoter-system
  labels:
    app.kubernetes.io/name: service
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: promoter
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
