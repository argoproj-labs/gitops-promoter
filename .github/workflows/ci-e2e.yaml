name: test-e2e
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        # Three-minor sliding window for Kind e2e coverage. Renovate bumps individual
        # kindest/node entries; when the newest minor advances, add the new version
        # and drop the oldest so the matrix stays at three consecutive minors.
        kubernetes-minor-version:
          - 1.34.8
          - 1.35.5
          - 1.36.1
    name: E2E Tests (${{ matrix.kubernetes-minor-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.5'
          # see https://github.com/actions/setup-go?tab=readme-ov-file#caching-dependency-files-and-build-outputs
          cache-dependency-path: |
            go.sum
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kind
          version: v0.32.0
          node_image: kindest/node:v${{ matrix.kubernetes-minor-version }}
          kubectl_version: v${{ matrix.kubernetes-minor-version }}
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run E2E-Tests
        run: make test-e2e
  e2e:
    # Stable status check for branch protection; matrix jobs above may change names when
    # kindest/node versions bump, but this job name stays constant.
    name: E2E Tests
    needs: ci
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All matrix jobs passed
        run: |
          if [[ "${{ needs.ci.result }}" != "success" ]]; then
            echo "One or more E2E matrix jobs failed or were cancelled."
            exit 1
          fi
