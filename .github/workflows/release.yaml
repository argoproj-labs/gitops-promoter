# This file must be kept in sync with release-latest.yaml except for the
# trigger, job name, and release section.
#
# Triggered by workflow_dispatch, dispatched by create-release-tag.yaml on a
# tag ref. The workflow only runs when github.ref is a tag, ensuring the
# Sigstore OIDC certificate identity is refs/tags/vX.Y.Z.
name: release

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  GORELEASER_PREVIOUS_TAG: ${{vars.GORELEASER_PREVIOUS_TAG}}

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      packages: write
    if: startsWith(github.ref, 'refs/tags/')
    name: Release
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Docker
        uses: docker/setup-docker-action@5223f80f64587ec3bf588369be41ea8e6cda1dbb
        with:
          version: type=image,tag=29.1.5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26.4"

      - name: Docker Login in quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      # sigstore/cosign-installer v4.1.1 (latest release). Action pinned to commit SHA — update tag + SHA from
      # https://github.com/sigstore/cosign-installer/releases when upgrading (do not use a floating @v4 ref).
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # cosign-installer v4.1.2
        with:
          cosign-release: v3.0.5 # cosign CLI; latest sigstore/cosign, explicit pin for reproducibility

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
