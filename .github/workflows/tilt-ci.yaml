name: tilt-ci.yaml

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ARGOCD_VERSION: v3.4.4

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tilt-ci:
    name: Run Tilt CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.18.0'
          cache: 'npm'
          cache-dependency-path: |
            ui/dashboard/package-lock.json
            ui/extension/package-lock.json
            ui/components-lib/package-lock.json

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.32.0

      - name: Install Argo CD
        run: |
          kubectl create namespace argocd
          kubectl apply --server-side -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/${{ env.ARGOCD_VERSION }}/manifests/install-with-hydrator.yaml
          kubectl wait --for=condition=available --timeout=300s deployment/argocd-server -n argocd

      - name: Install Tilt
        run: |
          TILT_VERSION=v0.37.5
          curl -fsSL "https://raw.githubusercontent.com/tilt-dev/tilt/${TILT_VERSION}/scripts/install.sh" -o /tmp/tilt-install.sh
          chmod +x /tmp/tilt-install.sh
          /tmp/tilt-install.sh

      - name: Run Tilt CI
        run: tilt ci