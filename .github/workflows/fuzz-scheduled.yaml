# Exploratory fuzzing on a schedule (FUZZ_TIME in Makefile, default 30s per target). PR CI runs `make fuzz-replay` (seeds + corpus replay only).
name: fuzz scheduled
on:
  schedule:
    - cron: '12 7 * * 1' # Mondays 07:12 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Bounded native fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
      - name: Run fuzz targets
        run: make fuzz-explore
