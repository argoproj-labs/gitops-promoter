# Exploratory fuzzing on a schedule (FUZZ_TIME in Makefile, default 30s per target). PR CI runs `make fuzz-replay` (seeds + corpus replay only).
name: fuzz scheduled
on:
  schedule:
    - cron: '12 7 * * 1' # Mondays 07:12 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Bounded native fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v4
      - name: Set up Go
        uses: actions/setup-go@4aaadf42668403795cdfdb15b1c4250e9fed12b9 # pin@v5
        with:
          go-version: "1.26.4"
      - name: Run fuzz targets
        run: make fuzz-explore
