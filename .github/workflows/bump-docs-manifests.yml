name: Bump Docs Manifests

on:
  workflow_dispatch:
    inputs:
      new_version:
        description: 'New version (e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  bump-docs:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
      - name: Bump manifest versions in docs
        run: |
          chmod +x hack/bump-docs-manifests.sh
          ./hack/bump-docs-manifests.sh ${GITHUB_EVENT_INPUTS_NEW_VERSION}
          git add docs/getting-started.md docs/integrating-with-argocd/tutorial.md docs/integrating-with-argocd/index.md cmd/demo/config/promoter_version cmd/demo/config/argocd-extension.yaml cmd/demo/config/config.yaml
        env:
          GITHUB_EVENT_INPUTS_NEW_VERSION: ${{ github.event.inputs.new_version }}
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "docs: bump manifest versions to v${{ github.event.inputs.new_version }}"
          title: "docs: bump manifest versions to v${{ github.event.inputs.new_version }}"
          body: "Automated PR to bump manifest versions in documentation."
          branch: "bump-docs-manifests/v${{ github.event.inputs.new_version }}"
          delete-branch: true
          signoff: true

