# This file must be kept in sync with release.yaml except for the trigger,
# job name, and release section.
name: release-latest

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # If set in the repo env vars it will use this tag to build the release notes.
  GORELEASER_PREVIOUS_TAG: ${{vars.GORELEASER_PREVIOUS_TAG}}

defaults:
  run:
    shell: bash

jobs:
  release-latest:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      packages: write
    name: Push Latest Docker Image
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker
        uses: docker/setup-docker-action@994c3d50f9b4a990bfb91dced73607ccbc906a1c
        with:
          version: type=image,tag=29.1.5
    
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"

      - name: Docker Login to quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.5 # cosign CLI; latest sigstore/cosign, explicit pin for reproducibility

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version:  v2.16.0
          args: release -f .goreleaser-latest.yaml --clean --verbose --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Images Latest
        run: |
          docker push quay.io/argoprojlabs/gitops-promoter:latest-amd64
          docker push quay.io/argoprojlabs/gitops-promoter:latest-arm64
          docker inspect quay.io/argoprojlabs/gitops-promoter:latest-amd64
          docker inspect quay.io/argoprojlabs/gitops-promoter:latest-arm64
          docker buildx imagetools create -t quay.io/argoprojlabs/gitops-promoter:latest \
            quay.io/argoprojlabs/gitops-promoter:latest-amd64 \
            quay.io/argoprojlabs/gitops-promoter:latest-arm64

      - name: Cosign sign latest images
        run: |
          cosign sign quay.io/argoprojlabs/gitops-promoter:latest-amd64 --yes
          cosign sign quay.io/argoprojlabs/gitops-promoter:latest-arm64 --yes
          cosign sign quay.io/argoprojlabs/gitops-promoter:latest --yes
