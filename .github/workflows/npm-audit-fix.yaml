name: npm audit fix

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  npm-audit-fix:
    name: Run npm audit fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Run npm audit fix
        run: |
          cd "$GITHUB_WORKSPACE/ui/dashboard" && npm install && npm audit fix
          cd "$GITHUB_WORKSPACE/ui/extension" && npm install && npm audit fix
          cd "$GITHUB_WORKSPACE/ui/components-lib" && npm install && npm audit fix

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore: npm audit fix"
          title: "chore: npm audit fix"
          body: |
            Automated PR to fix npm audit vulnerabilities.

            Generated by the [npm audit fix](https://github.com/argoproj-labs/gitops-promoter/actions/workflows/npm-audit-fix.yaml) workflow.
          branch: npm-audit-fix/automated
          delete-branch: true
          signoff: true
