name: npm audit fix

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Run with --force (upgrades to latest, may include breaking changes)"
        default: "false"
        required: false
        type: boolean

permissions:
  contents: read

jobs:
  npm-audit-fix:
    name: Run npm audit fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run npm audit fix
        env:
          FORCE_FLAG: ${{ inputs.force == true && '--force' || '' }}
        run: |
          for pkg in ui/dashboard ui/extension ui/components-lib; do
            cd "$GITHUB_WORKSPACE/$pkg"
            npm install
            # npm audit fix exits 1 when devDependency vulns remain; CI only checks prod deps.
            npm audit fix $FORCE_FLAG || true
          done
          cd "$GITHUB_WORKSPACE/ui/dashboard" && npm audit --omit=dev
          cd "$GITHUB_WORKSPACE/ui/extension" && npm audit --omit=dev

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore: npm audit fix"
          title: "chore: npm audit fix"
          body: |
            Automated PR to fix npm audit vulnerabilities.

            Generated by the [npm audit fix](https://github.com/argoproj-labs/gitops-promoter/actions/workflows/npm-audit-fix.yaml) workflow.

            > [!NOTE]
            > After the PR is created, you must **close and reopen it** to trigger CI checks.
          branch: npm-audit-fix/automated
          delete-branch: true
          signoff: true
