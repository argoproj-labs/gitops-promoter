name: Renovate
on:
  schedule:
    # Run every (Wednesday, Saturday and Sunday) at 3 AM UTC 
    - cron: '0 3 * * 0,3,6'
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Dry-Run"
        default: "false"
        required: false
      logLevel:
        description: "Log-Level"
        default: "debug"
        required: false
  push:
    branches:
      - main
    paths:
      - '.github/workflows/renovate.yaml'
      - 'renovate.json5'

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      # https://github.com/renovatebot/github-action?tab=readme-ov-file#example-with-github-app
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get token
        id: get_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: Iv23liDYTI2rxpKqBDiv
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # https://docs.renovatebot.com/modules/platform/github/#running-as-a-github-app
          # These MUST be a subset of the permissions granted to the App installation
          # (see RENOVATE_SETUP.md). Requesting any ungranted permission makes token
          # minting fail with HTTP 422.
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write
          permission-metadata: read
          permission-statuses: write
          permission-vulnerability-alerts: read

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: renovate.json5
          token: ${{ steps.get_token.outputs.token }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun == 'true' }}
          # Global-only options that cannot be in renovate.json5
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ALLOWED_POST_UPGRADE_COMMANDS: '["^go mod tidy$","^make go-fix","^make lint-fix","^make mockery-gen$","^make build-installer$","^make manifests$","^make generate$","^pip-compile"]'
          RENOVATE_ALLOW_SHELL_EXECUTOR_FOR_POST_UPGRADE_COMMANDS: 'true'
