version: 2
updates:
  # Note: Go version and golangci-lint version updates are handled by Renovate.
  # The coupled Kubernetes platform packages (k8s.io/*, controller-runtime,
  # multicluster-runtime, and their staging deps) are ALSO owned by Renovate so
  # they can be bumped in lockstep with the Makefile envtest versions; they are
  # ignored here to avoid duplicate PRs. See renovate.json5 for configuration.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    # By default Dependabot only bumps direct requires. Indirect modules listed in
    # go.mod (e.g. golang.org/x/crypto) need this to get version-update PRs.
    allow:
      - dependency-type: "indirect"
    ignore:
      - dependency-name: "k8s.io/*"
      - dependency-name: "sigs.k8s.io/controller-runtime"
      - dependency-name: "sigs.k8s.io/multicluster-runtime"
      - dependency-name: "sigs.k8s.io/structured-merge-diff/*"
      - dependency-name: "sigs.k8s.io/json"
      - dependency-name: "sigs.k8s.io/randfill"
    groups:
      # etcd modules (api, client/pkg, client/v3) release together; one PR beats three.
      go-etcd:
        patterns:
          - "go.etcd.io/etcd/*"
      # otel core, exporters, contrib instrumentation, and proto/otlp share a release train.
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
