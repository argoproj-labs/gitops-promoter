site_name: GitOps Promoter - A GitOps First Environment Promotion Tool
repo_url: https://github.com/argoproj-labs/gitops-promoter
site_url: https://gitops-promoter.readthedocs.io/
theme:
  font:
    text: Work Sans
  logo: assets/logo/icon/secondary.png
  favicon: assets/logo/favicon.png
  name: material
  features:
    - content.code.copy
  palette:
    - primary: custom
      accent: custom
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - markdown_include.include
  - codehilite:
      css_class: highlight
  - admonition
  - pymdownx.superfences
  # Fenced tab blocks (/// tab | … ///) avoid indented-tab syntax that GitHub renders as code blocks.
  - pymdownx.blocks.tab:
      alternate_style: true
      # Tab label slugs for anchors (e.g. #github); tab bodies intentionally omit headings (see getting-started.md).
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        args: []
        kwds:
          case: lower
nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Getting Started: getting-started.md
  - Structuring Your Repos: structuring-your-repos.md
  - Gating Promotions:
      - Overview: gating-promotions/index.md
      - Built-In Gates:
          - ArgoCDCommitStatus: gating-promotions/built-in-gates/argocd-commit-status.md
          - DAGCommitStatus: gating-promotions/built-in-gates/dag-commit-status.md
          - GitCommitStatus: gating-promotions/built-in-gates/git-commit-status.md
          - PreviousEnvironmentCommitStatus: gating-promotions/built-in-gates/previous-environment-commit-status.md
          - TimedCommitStatus: gating-promotions/built-in-gates/timed-commit-status.md
          - ScheduledCommitStatus: gating-promotions/built-in-gates/scheduled-commit-status.md
          - WebRequestCommitStatus:
              - Overview: gating-promotions/built-in-gates/web-request-commit-status/index.md
              - Simulator: gating-promotions/built-in-gates/web-request-commit-status/simulator.md
  - Integrating with Argo CD:
      - Overview: integrating-with-argocd/index.md
      - Tutorial: integrating-with-argocd/tutorial.md
  - Monitoring:
      - Overview: monitoring/index.md
      - Events: monitoring/events.md
      - Logs: monitoring/logs.md
      - Metrics: monitoring/metrics.md
  - Debugging:
      - Overview: debugging/index.md
      - Finalizers: debugging/finalizers.md
      - Labels: debugging/labels.md
  - Advanced Usage:
      - Overview: advanced-usage/index.md
      - Using a Custom Hydrator: advanced-usage/custom-hydrator.md
      - Configuring Multi-Tenancy: advanced-usage/multi-tenancy.md
      - Multiple Controller Installs: multi-install.md
      - Dashboard Aggregation API: advanced-usage/dashboard-apiserver.md
  - CRD Specs: crd-specs.md
  - Contributing:
      - Overview: contributing/index.md
      - Developing a CommitStatus: contributing/developing-a-commitstatus.md
      - Developing the Argo CD Extension: contributing/developing-the-argocd-extension.md
      - Adding an SCM Provider: contributing/adding-an-scm-provider.md
      - Writing CEL Validation Rules: contributing/writing-cel-rules.md
      - Continuous Integration: contributing/ci.md
      - UI TypeScript types: contributing/ui-types.md
      - Cutting a Release: contributing/cutting-a-release.md
      - Using Finalizers: contributing/using-finalizers.md
      - Maintaining CRDs: contributing/maintaining-crds.md
      - Maintaining Resource Status: contributing/updating-status.md
  - Security Policy: security.md
  - Tool Comparison: tool-comparison.md
  - FAQs: faqs.md
  - Roadmap: roadmap.md
plugins:
  - gh-admonitions
  - redirects:
      redirect_maps:
        'metrics.md': 'monitoring/metrics.md'
        'repository-structure.md': 'structuring-your-repos.md'
        'commit-status-controllers/argocd.md': 'gating-promotions/built-in-gates/argocd-commit-status.md'
        'commit-status-controllers/git-commit.md': 'gating-promotions/built-in-gates/git-commit-status.md'
        'commit-status-controllers/timed.md': 'gating-promotions/built-in-gates/timed-commit-status.md'
        'commit-status-controllers/web-request.md': 'gating-promotions/built-in-gates/web-request-commit-status/index.md'
        'commit-status-controllers/web-request-simulator.md': 'gating-promotions/built-in-gates/web-request-commit-status/simulator.md'
        'commit-status-controllers/development-best-practices.md': 'contributing/developing-a-commitstatus.md'
        'argocd-integrations/index.md': 'integrating-with-argocd/index.md'
        'argocd-integrations/development.md': 'contributing/developing-the-argocd-extension.md'
        'tutorial-argocd-apps.md': 'integrating-with-argocd/tutorial.md'
        'custom-hydrator.md': 'advanced-usage/custom-hydrator.md'
        'multi-tenancy.md': 'advanced-usage/multi-tenancy.md'
        'dashboard-apiserver.md': 'advanced-usage/dashboard-apiserver.md'
